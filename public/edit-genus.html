<!DOCTYPE html>
<html lang="sr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Izmeni rod - ZooIndex</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="/css/global.css">
</head>


<body data-bs-theme="light">
    
    <main class="container">
        <div class="crud-container">
            <div class="card">
                <div class="card-header fw-bold">Izmeni rod</div>
                
                <div class="card-body">
                    <div class="mb-3">
                        <label for="id" class="form-label">ID:</label>
                        <input type="number" class="form-control" id="id" disabled>
                    </div>
                    <div class="mb-3">
                        <label for="name" class="form-label">Naziv:</label>
                        <input type="text" class="form-control" id="name">
                    </div>
                    <div class="mb-3">
                        <label for="latinName" class="form-label">Latinski naziv:</label>
                        <input type="text" class="form-control" id="latinName">
                    </div>
                    <div class="mb-3">
                        <label for="familyName" class="form-label">Porodica:</label>
                        <input type="text" class="form-control" id="familyName">
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Opis:</label>
                        <textarea class="form-control" id="description"></textarea>
                    </div>
                </div>

                <div class="card-footer page-actions">
                    <button type="button" class="btn btn-success" id="save">
                        <i class="fa-solid fa-floppy-disk"></i> Sacuvaj
                    </button>
                    <a href="/genus.html" class="btn btn-secondary">Nazad</a>
                </div>

            </div>
        </div>
    </main>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/js/utils.js"></script>
    
    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        if (id == null || id === "") {
            openPage("/genus.html");
        }

        retrieveData(`/api/genus/${id}`, genus => {
            document.getElementById("id").value = genus.genusId;
            document.getElementById("name").value = genus.name;
            document.getElementById("latinName").value = genus.latinName;
            document.getElementById("familyName").value = genus.familyName;
            document.getElementById("description").value = genus.description;
        });

        document.getElementById("save").addEventListener("click", () => {
            showConfirm("Sacuvaj izmene?", () => {
                fetch(`/api/genus/${id}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        name: document.getElementById("name").value,
                        latinName: document.getElementById("latinName").value,
                        familyName: document.getElementById("familyName").value,
                        description: document.getElementById("description").value
                    })
                }).then(() => openPage("/genus.html"));
            });
        });
    </script>
</body>

</html>
