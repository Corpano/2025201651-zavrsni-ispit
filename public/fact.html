<!DOCTYPE html>
<html lang="sr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zanimljivosti - ZooIndex</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="/css/global.css">
</head>


<body data-bs-theme="light">

    <main class="container">
        <div class="card">

            <div class="card-header fw-bold">Zanimljivosti o zivotinjama</div>
            <div class="card-body">
                <div class="fact-grid" id="facts"></div>
            </div>
            <div class="card-footer">
                <a href="/new-fact.html" class="btn btn-primary">
                    <i class="fa-solid fa-plus"></i> Dodaj zanimljivost
                </a>
            </div>

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/js/utils.js"></script>



    <script>
        function edit(id) {
            openPage(`/edit-fact.html?id=${id}`);
        }

        function remove(id) {
            showConfirm(`Obrisi zanimljivost ${id}?`, () => {
                fetch(`/api/fact/${id}`, { method: "DELETE" })
                    .then(() => window.location.reload());
            });
        }

        retrieveData("/api/fact", data => {
            let content = "";
            for (let fact of data) {
                content += `
                    <div class="card h-100">
                        <div class="card-body">
                            <span class="badge text-bg-success mb-3">${fact.animal.commonName}</span>
                            <h5 class="card-title">${fact.title}</h5>
                            <p class="card-text">${fact.content}</p>
                        </div>
                        <div class="card-footer d-flex justify-content-between align-items-center gap-2">
                            <span class="text-secondary small">#${fact.factId}</span>
                            <div class="btn-group btn-group-sm">
                                <button class="btn btn-success" type="button" onclick="edit(${fact.factId})">
                                    <i class="fa-solid fa-pen-to-square"></i>
                                </button>
                                <button class="btn btn-danger" type="button" onclick="remove(${fact.factId})">
                                    <i class="fa-solid fa-trash-can"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }
            document.getElementById("facts").innerHTML = content;
        });
    </script>
</body>

</html>
