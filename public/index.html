<!DOCTYPE html>
<html lang="sr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZooIndex</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="/css/global.css">
</head>

<body data-bs-theme="light">
    <main class="container">
        <div class="card">
            <div class="card-header fw-bold">Sve zivotinje</div>
            <div class="card-body">
                <div class="row g-2 align-items-end mb-3">
                    <div class="col-md-5">
                        <label for="genusFilter" class="form-label">Prikazi po rodu:</label>
                        <select class="form-select" id="genusFilter">
                            <option value="">Svi rodovi</option>
                        </select>
                    </div>
                </div>
                <div class="animal-grid" id="animals"></div>
            </div>
            <div class="card-footer">
                <a href="/new-animal.html" class="btn btn-primary">
                    <i class="fa-solid fa-plus"></i> Dodaj zivotinju
                </a>
            </div>
        </div>
    </main>

    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/js/utils.js"></script>

    <script>
        function edit(id) {
            openPage(`/edit-animal.html?id=${id}`);
        }

        function remove(id) {
            showConfirm(`Obrisi zivotinju ${id}?`, () => {
                fetch(`/api/animal/${id}`, { method: "DELETE" })
                    .then(() => window.location.reload());
            });
        }

        const animalGrid = document.getElementById("animals");
        const inputGenusFilter = document.getElementById("genusFilter");
        let animals = [];
        let factsByAnimalId = {};

        function renderAnimals() {
            const selectedGenusId = inputGenusFilter.value;
            const filteredAnimals = selectedGenusId === ""
                ? animals
                : animals.filter(animal => String(animal.genus.genusId) === selectedGenusId);

            if (filteredAnimals.length === 0) {
                animalGrid.innerHTML = `
                    <div class="alert alert-info mb-0">
                        Nema zivotinja za izabrani rod.
                    </div>
                `;
                return;
            }

            let content = "";
            for (let animal of filteredAnimals) {
                const cardImage = animal.imageUrl
                    ? `<img src="${animal.imageUrl}" alt="${animal.commonName}" class="card-img-top animal-card-img">`
                    : `<div class="animal-card-placeholder"><i class="fa-solid fa-image"></i></div>`;
                const animalFacts = factsByAnimalId[animal.animalId] || [];
                const factsContent = animalFacts.length > 0
                    ? animalFacts.map(fact => `
                        <li class="list-group-item px-0 bg-transparent">
                            <i class="fa-solid fa-lightbulb text-warning"></i>
                            <strong>${fact.title}:</strong> ${fact.content}
                        </li>
                    `).join("")
                    : `<li class="list-group-item px-0 bg-transparent text-secondary">Nema dodatih zanimljivosti.</li>`;

                content += `
                    <div class="card h-100">
                        ${cardImage}
                        <div class="card-body">
                            <h5 class="card-title mb-1">${animal.commonName}</h5>
                            <p class="card-subtitle text-secondary fst-italic mb-3">${animal.latinName}</p>
                            <div class="animal-meta mb-3">
                                <span class="badge text-bg-success">${animal.genus.name}</span>
                                <span class="badge text-bg-secondary">${animal.conservationStatus}</span>
                            </div>
                            <p class="card-text animal-description">${animal.description}</p>
                            <ul class="list-group list-group-flush">
                                <li class="list-group-item px-0 bg-transparent">
                                    <strong>Staniste:</strong> ${animal.habitat}
                                </li>
                                <li class="list-group-item px-0 bg-transparent">
                                    <strong>Ishrana:</strong> ${animal.diet}
                                </li>
                            </ul>
                            <div class="animal-facts mt-3">
                                <h6 class="mb-2">Zanimljivosti</h6>
                                <ul class="list-group list-group-flush">
                                    ${factsContent}
                                </ul>
                            </div>
                        </div>
                        <div class="card-footer d-flex justify-content-between align-items-center gap-2">
                            <span class="text-secondary small">#${animal.animalId}</span>
                            <div class="btn-group btn-group-sm">
                                <button class="btn btn-sm btn-success" type="button" onclick="edit(${animal.animalId})">
                                    <i class="fa-solid fa-pen-to-square"></i>
                                </button>
                                <button class="btn btn-sm btn-danger" type="button" onclick="remove(${animal.animalId})">
                                    <i class="fa-solid fa-trash-can"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }
            animalGrid.innerHTML = content;
        }

        Promise.all([
            fetch("/api/animal").then(rsp => rsp.json()),
            fetch("/api/fact").then(rsp => rsp.json()),
            fetch("/api/genus").then(rsp => rsp.json())
        ]).then(([data, facts, rodovi]) => {
            animals = data;
            factsByAnimalId = {};

            for (let genus of rodovi) {
                const opt = document.createElement("option");
                opt.value = genus.genusId;
                opt.innerText = `${genus.name} (${genus.latinName})`;
                inputGenusFilter.appendChild(opt);
            }

            for (let fact of facts) {
                const animalId = fact.animal.animalId;
                if (factsByAnimalId[animalId] == null) {
                    factsByAnimalId[animalId] = [];
                }
                factsByAnimalId[animalId].push(fact);
            }

            renderAnimals();
        });

        inputGenusFilter.addEventListener("change", renderAnimals);
    </script>
</body>

</html>
