<!DOCTYPE html>
<html lang="sr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Izmeni zivotinju - ZooIndex</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="/css/global.css">

</head>

<body data-bs-theme="light">
    
    <main class="container">
    
        <div class="crud-container">
            <div class="card">
                <div class="card-header fw-bold">Izmeni zivotinju</div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="id" class="form-label">ID:</label>
                        <input type="number" class="form-control" id="id" disabled>
                    </div>
                    <div class="mb-3">
                        <label for="commonName" class="form-label">Naziv:</label>
                        <input type="text" class="form-control" id="commonName">
                    </div>
                    <div class="mb-3">
                        <label for="latinName" class="form-label">Latinski naziv:</label>
                        <input type="text" class="form-control" id="latinName">
                    </div>
                    <div class="mb-3">
                        <label for="genus" class="form-label">Rod:</label>
                        <select class="form-select" id="genus"></select>
                    </div>
                    <div class="mb-3">
                        <label for="habitat" class="form-label">Staniste:</label>
                        <input type="text" class="form-control" id="habitat">
                    </div>
                    <div class="mb-3">
                        <label for="diet" class="form-label">Ishrana:</label>
                        <input type="text" class="form-control" id="diet">
                    </div>
                    <div class="mb-3">
                        <label for="conservationStatus" class="form-label">Status ocuvanja:</label>
                        <input type="text" class="form-control" id="conservationStatus">
                    </div>
                    <div class="mb-3">
                        <label for="imageUrl" class="form-label">URL slike:</label>
                        <input type="url" class="form-control" id="imageUrl">
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Opis:</label>
                        <textarea class="form-control" id="description"></textarea>
                    </div>
                </div>



                <div class="card-footer page-actions">
                    <button type="button" class="btn btn-success" id="save">
                        <i class="fa-solid fa-floppy-disk"></i> Sacuvaj
                    </button>
                    <a href="/index.html" class="btn btn-secondary">Nazad</a>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>


    <script src="/js/utils.js"></script>
    
    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");
        const inputGenus = document.getElementById("genus");
        let currentAnimal = null;

        if (id == null || id === "") {
            openPage("/index.html");
        }

        Promise.all([
            fetch("/api/genus").then(rsp => rsp.json()),
            
            fetch(`/api/animal/${id}`).then(rsp => rsp.json())

        ]).then(([genera, animal]) => {
            
            currentAnimal = animal;

            for (let genus of genera) {
                const opt = document.createElement("option");
            
                opt.value = genus.genusId;
                opt.innerText = `${genus.name} (${genus.latinName})`;
                inputGenus.appendChild(opt);
            }

            document.getElementById("id").value = animal.animalId;
            document.getElementById("commonName").value = animal.commonName;
            document.getElementById("latinName").value = animal.latinName;
            document.getElementById("habitat").value = animal.habitat;
            document.getElementById("diet").value = animal.diet;
            document.getElementById("conservationStatus").value = animal.conservationStatus;
            document.getElementById("imageUrl").value = animal.imageUrl || "";
            document.getElementById("description").value = animal.description;
            
            inputGenus.value = animal.genus.genusId;
        });

        document.getElementById("save").addEventListener("click", () => {
            
            showConfirm("Sacuvaj izmene?", () => {
                fetch(`/api/animal/${currentAnimal.animalId}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        commonName: document.getElementById("commonName").value,
                        latinName: document.getElementById("latinName").value,
                        habitat: document.getElementById("habitat").value,
                        diet: document.getElementById("diet").value,
                        conservationStatus: document.getElementById("conservationStatus").value,
                        imageUrl: document.getElementById("imageUrl").value,
                        description: document.getElementById("description").value,
                        genus: {
                            genusId: inputGenus.value
                        }
                    })
                }).then(() => openPage("/index.html"));
            });
        });
    </script>
</body>

</html>
